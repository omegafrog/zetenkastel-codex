# 11. Integration Test (Final Step)

구현 완료 후 반드시 수행:
1. 대표 유스케이스 통합 테스트 1개 이상 작성
2. 외부 시스템 호출은 mocking
3. 테스트 실행
4. 실행 중 로그 및 메트릭 확인(해당 규칙이 활성화된 경우)

테스트 명령은 다음 우선순위로 결정한다:
1. `.codex/test-gate.yaml`
2. `.codex/stack-profile.yaml`
3. `.codex/repository-settings.md`
4. 기존 코드베이스 관례

