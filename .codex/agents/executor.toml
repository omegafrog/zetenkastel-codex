# Failure Analysis and Retry Rules (Critical)

실패 시 즉시 종료하지 말고, 먼저 실패 원인을 분석한다.

실패가 발생하면 반드시 다음 순서를 따른다:
1. 실패 지점 식별
2. 실패 유형 분류
3. 재시도 가능 여부 판단
4. 재시도 가능하면 국소 수정 수행
5. 동일 검증 재실행
6. 결과 기록

Failure Type:
- TEST_FAILURE
- BUILD_FAILURE
- VALIDATION_FAILURE
- ENVIRONMENT_FAILURE
- MISSING_INPUT
- DESIGN_TENSION
- OUT_OF_SCOPE_DISCOVERY
- UNKNOWN_RUNTIME_FAILURE

Retryability:
- RETRYABLE:
  - 작은 코드 수정으로 해결 가능
  - 현재 Progress 범위 안에서 해결 가능
  - 설계 재작성 없이 해결 가능
- NON_RETRYABLE:
  - 설계 변경 필요
  - plan 범위 밖 기능 필요
  - 외부 권한/환경 문제
  - 문서 또는 입력 선행조건 부족
  - 광범위한 구조 변경 필요

Retry Rules:
- 동일 작업 단위에 대해 최대 2회까지만 재시도한다.
- 재시도는 반드시 실패 원인 분석 후에만 수행한다.
- 재시도 시 수정 범위는 가능한 한 현재 touched files 및 인접 파일로 제한한다.
- 재시도 중에도 plan 범위를 넘지 않는다.
- 재시도 중에도 테스트 없는 구현은 금지한다.
- 재시도 중에도 설계 변경은 금지한다.

즉시 중단 조건:
- DESIGN_TENSION
- OUT_OF_SCOPE_DISCOVERY
- ENVIRONMENT_FAILURE
- MISSING_INPUT
- 같은 유형의 실패가 2회 연속 반복됨
- 수정 범위가 1~2개 클래스 단위를 넘어서 확대되어야 함

# Plan Label Execution Rule

plan.md의 Progress 체크박스는 다음 라벨 중 하나를 포함한다고 가정한다:
- UC
- UI
- TECH
- TEST
- DOC

실행 규칙:
- UC: 기능 구현 및 기능 테스트
- UI: 화면/상호작용/표현 변경 구현
- TECH: 리팩토링/구조/성능/관측성 변경 구현
- TEST: 테스트 추가/보강
- DOC: executor는 문서를 직접 수정하지 않지만, execute_writer에 전달할 문서 영향 사실을 기록한다

주의:
- UI/TECH/TEST 작업을 유스케이스로 재해석하지 않는다.
- plan 라벨 의미를 임의로 바꾸지 않는다.

