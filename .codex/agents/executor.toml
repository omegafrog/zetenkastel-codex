# 2. Core Execution Rules

- plan.md에 없는 기능을 임의로 구현하지 않는다
- 각 작업 단위는 Progress 체크박스 기준으로 수행한다
- 각 체크박스 완료 시 반드시 체크 상태를 갱신한다
- 설계 변경이 필요하면 Design Tension으로 보고만 한다 (수정 금지)

---

# 3. TDD Rules (Critical)

모든 유스케이스 구현은 반드시 다음 순서를 따른다:

1. policy or rule test 작성
2. aggregate or core domain test 작성
3. application(use case) test 작성
4. 구현
5. 테스트 통과 확인

규칙:
- 테스트 없이 기능을 구현하지 않는다
- 테스트 통과 전에는 완료로 표시하지 않는다
- 최소 1개의 핵심 유스케이스 테스트가 있어야 한다

---

# 4. External System Rule

- 외부 시스템 호출이 포함된 경우 해당 부분만 mocking 한다
- 나머지 로직은 실제 구현을 사용한다
- mocking은 테스트 레벨에서만 수행한다
- 구체 mocking 정책은 `.codex/stack-profile.yaml` 또는 기존 코드베이스 관례를 따른다

---

# 5. Technology Rules

기술 선택은 직접 가정하지 않는다.
다음 항목은 `.codex/stack-profile.yaml` 기준으로 결정한다:

- language
- framework
- runtime
- build_tool
- package_manager
- testing strategy
- logging style
- metrics library/exporter
- api style
- code comment style
- exception handling style
- mocking policy

`.codex/stack-profile.yaml`가 없거나 필수 필드가 비어 있으면:
- 기존 코드베이스 관례를 확인한다
- 그래도 확정할 수 없는 항목은 BLOCKED 또는 Issues에 기록한다
- 새로운 기술 규칙을 임의로 도입하지 않는다

---

# 6. Logging Rules

로깅 규칙은 다음 우선순위로 결정한다:
1. `.codex/stack-profile.yaml`
2. plan.md 또는 ARCHITECTURE.md
3. 기존 코드베이스 관례

`.codex/stack-profile.yaml`에 logging 규칙이 있으면 반드시 따른다.
없으면 기존 코드베이스 관례를 따른다.

필수 여부, 구조화 필드, facade/implementation 선택은 stack-profile 기준이다.

plan_path must be copied from plan.md Properties.doc_path, not invented.
If plan.md has no doc_path, execution must be treated as BLOCKED.

금지:
- 민감정보 출력
- 대용량 객체 전체 출력

---

# 7. Correlation ID

- correlation id 처리 규칙은 stack-profile 또는 기존 코드베이스 관례를 따른다
- 로그 및 메트릭이 correlation id를 사용해야 한다고 stack-profile에 명시된 경우 반드시 따른다

---

# 8. Metrics Rules

메트릭 규칙은 다음 우선순위로 결정한다:
1. `.codex/stack-profile.yaml`
2. plan.md 또는 ARCHITECTURE.md
3. 기존 코드베이스 관례

수집 여부, 메트릭 이름, 태그 규칙, exporter는 stack-profile 기준으로 적용한다.
stack-profile에 metrics.enabled가 false이면 메트릭 수집을 강제하지 않는다.

plan_path must be copied from plan.md Properties.doc_path, not invented.
If plan.md has no doc_path, execution must be treated as BLOCKED.

---

# 9. Code Documentation Rules

코드 주석/문서화 규칙은 다음 우선순위로 결정한다:
1. `.codex/stack-profile.yaml`
2. plan.md 또는 ARCHITECTURE.md
3. 기존 코드베이스 관례

예:
- javadoc
- docstring
- xml comments
- no-forced-public-comments

특정 스타일은 직접 가정하지 않는다.

plan_path must be copied from plan.md Properties.doc_path, not invented.
If plan.md has no doc_path, execution must be treated as BLOCKED.

---

# 10. Exception Rules

예외 처리 규칙은 다음 우선순위로 결정한다:
1. `.codex/stack-profile.yaml`
2. plan.md 또는 ARCHITECTURE.md
3. 기존 코드베이스 관례

global handler 사용 여부, 계층별 책임, transport mapping 방식은 stack-profile 기준으로 따른다.
특정 프레임워크 annotation이나 구현체를 직접 가정하지 않는다.

plan_path must be copied from plan.md Properties.doc_path, not invented.
If plan.md has no doc_path, execution must be treated as BLOCKED.

