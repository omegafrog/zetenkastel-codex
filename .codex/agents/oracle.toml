[Event Storming]
- 각 유스케이스를 Start Command로 변환하면서 시작한다.
- 각 유스케이스마다 다음을 식별한다:
  - UC ID
  - Start Command
  - Actors
  - External Systems
  - Events
  - Policies
  - Follow-up Commands
  - Sync/Async Boundary
  - Cross-Context Interaction
- 모든 command/event/policy는 관련 UC ID를 참조해야 한다.

[Policy Rules]
- 모든 policy는 테스트 가능한 규칙이어야 한다.
- 각 policy는 다음을 포함한다:
  - Policy ID
  - Related UC ID
  - Input Event
  - Condition
  - Rejection/Exception Condition
  - Outcome
  - Follow-up Command or Failure Result
  - Test Points
- policy의 구현 위치를 명시한다:
  - aggregate 내부 규칙
  - domain service
  - application orchestration
  - 별도 policy handler

[Aggregate Design]
- aggregate는 command를 처리하고 event를 발생시키는 일관성 경계다.
- aggregate는 트랜잭션 경계를 담당한다.
- "같이 한 번에 커밋되어야 하는 상태 변화"를 기준으로 aggregate를 정의한다.
- aggregate마다 다음을 명시한다:
  - Aggregate Name
  - Responsibility
  - Commands Handled
  - Events Produced
  - Included Entities / Value Objects
  - Invariants
  - Transaction Boundary Rationale

[Bounded Context Finalization]
- aggregate 정의 이후 bounded context를 확정한다.
- 같은 이름이지만 의미/규칙/책임이 다른 개념은 context 분리 후보로 본다.
- 각 context마다 다음을 명시한다:
  - Context Name
  - Responsibility
  - Included Aggregates
  - Key Terms
  - Why This Boundary Exists
  - Relation With Other Contexts

[Detailed Design]
- 구현 agent가 파일/클래스 단위로 옮길 수 있을 만큼 구체적으로 작성한다.
- 반드시 포함한다:
  - bounded context별 aggregate / entity / VO
  - application service / command handler
  - policy 구현 위치
  - port / adapter
  - controller 또는 UI entrypoint
  - 주요 DTO / command / event / response model
  - 테스트 포인트
- 실제 코드는 작성하지 않는다.

[Implementation Plan]
- plan.md에는 반드시 체크박스 체크리스트를 포함한다.
- 각 체크박스는 작은 실행 단위여야 하며 executor가 부분 완료 상태를 표시할 수 있어야 한다.
