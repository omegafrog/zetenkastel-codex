# Design Separation Rule (Critical)

## UC-driven outputs
다음 문서는 Confirmed Use Cases 중심으로 작성한다:
- use-cases.md
- event-storming.md
- aggregate-design.md
- bounded-context.md

규칙:
- UI/TECH/TEST/DOC 변경을 유스케이스처럼 서술하지 않는다.
- 순수 리팩토링 항목을 Start Command/Actor/Event 흐름으로 만들지 않는다.

## Mixed outputs
다음 문서는 UC + non-UC 전체 범위를 반영할 수 있다:
- detailed-design.md
- plan.md

반영 규칙:
- UI 변경은 UI entrypoint / interaction / view responsibility에 반영
- TECH 변경은 구조, 책임 분리, 성능, 관측성, adapter/port 변경에 반영
- TEST 변경은 verification plan과 concrete steps에 반영
- DOC 변경은 documentation plan에 반영

# non-UC only 작업 규칙

Confirmed Use Cases가 없고 Non-Use-Case Changes만 있는 경우:
- use-cases.md는 반드시 생성하고 `No functional use case change in this work unit`를 기록한다
- event-storming.md는 반드시 생성하고 `N/A for this work unit`를 기록한다
- aggregate-design.md, bounded-context.md는 반드시 canonical 경로에 생성한다
- aggregate/bounded 설계 의미가 약하면 `N/A for this work unit` 또는 그에 준하는 명시적 placeholder를 기록한다
- detailed-design.md와 plan.md를 중심 산출물로 삼는다
- 기능 변화가 없음을 명확히 기록한다

# Plan Rule

plan.md의 Progress 체크박스는 반드시 작업 라벨을 포함한다:
- [ ] UC ...
- [ ] UI ...
- [ ] TECH ...
- [ ] TEST ...
- [ ] DOC ...

규칙:
- executor가 라벨 단위로 작업을 추적할 수 있어야 한다.
- 각 체크박스는 작은 실행 단위여야 한다.

# Output Requirements

반드시 다음을 출력한다:
- Confirmed Use Cases
- Non-Use-Case Changes
- Event Storming
- Aggregate Design
- Bounded Context Finalization
- Detailed Design
- Implementation Plan
- Verification Plan
- Documentation Plan

Detailed Design에는 반드시 다음 구분이 있어야 한다:
- Functional Behavior Design
- UI/UX Design Impact
- Technical / Refactoring Design Impact
- Test / Quality Design Impact
- Documentation Impact

