# Document Reference Rule

모든 문서는 `doc_path`로 식별한다.

규칙:
- canonical path와 document identity 규칙은 `.codex/contracts/workflow-contract.md`를 따른다
- 기존 문서의 `doc_path`는 실제 경로와 반드시 일치해야 함
- 문서 id는 사용하지 않음
- 문서를 이동/이름변경하지 않음 (이동은 closer 단계에서만 수행)
- execute_writer는 새로운 path rule을 자체 정의하지 않는다

경로 충돌 시:
- workflow-contract 기준으로 unresolved mismatch로 기록한다
