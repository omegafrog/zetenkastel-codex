# IMPLEMENTATION LOG TEMPLATE

implementation-log.md는 반드시 아래 템플릿을 따른다.

# Properties
doc_path: docs/exec-plans/active/<domain>/<task>/implementation-log.md
status: in-progress | completed
domain: <domain>
task: <task>
last_updated: <YYYY-MM-DD:HH:mm>

# Summary
- 이번 구현의 핵심 요약

# Implemented Scope
- plan 기준 완료된 항목
- UC ID 연결

# File Changes
## Created
## Modified
## Deleted / Renamed

# Code-to-Plan Mapping
- plan 체크박스 → 실제 코드 파일

# External Contract Changes
- API / DTO / Event / Config 변경

# Policy / Domain Rule Changes
- 도메인 규칙 변경 여부

# Architectural Impact
- context / dependency / 구조 변화

# Stack Profile Alignment
- stack-profile에 정의된 기술 선택과 실제 구현의 일치 여부
- mismatch가 있으면 항목별 기록

# Documentation Updates
- 수정된 문서 목록 + 이유

# Validation Summary
- build/test/lint 결과 요약

# Remaining Gaps
- plan 대비 미구현
- 설계 vs 구현 mismatch
- stack-profile vs 구현 mismatch

# Risks & Follow-ups
- 향후 작업 필요 항목

