## coverage_gate
UC가 하나 이상 존재하는 경우에만 사용한다.

- YES:
  - 모든 사용자 목표가 confirmed use case에 반영
  - 주요 실패/예외 흐름 정의
  - 외부 시스템 식별
  - 구현 범위와 제외 범위 구분
  - Blocking Unknowns가 이벤트 스토밍 착수를 막지 않음

- PARTIAL / NO:
  - 기존 규칙 유지

## non_uc_scope_status
UC가 없고 non-UC 작업만 있는 경우 판정한다.

- READY:
  - UI/TECH/TEST/DOC 항목이 실행 가능 수준으로 분해됨
  - 구현 범위와 제외 범위가 구분됨
  - 설계 입력으로 사용할 수 있을 만큼 명확함

- PARTIAL:
  - 범위가 모호하거나 섞여 있음

# 상태 판정 규칙

1. UC 포함 작업:
- coverage_gate == YES
- stack_profile_status == READY
→ status: ready-for-oracle

2. non-UC only 작업:
- non_uc_scope_status == READY
- stack_profile_status == READY
→ status: ready-for-oracle

그 외:
→ status: draft 또는 blocked

