<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Zettelkasten Graph</title>
    <style>
      body {
        margin: 0;
        font-family: "Space Grotesk", "Pretendard", sans-serif;
        background: linear-gradient(145deg, #f6f9ec 0%, #edf0f5 55%, #e8ecff 100%);
        color: #1f2937;
      }
      .wrap { padding: 16px; max-width: 1100px; margin: 0 auto; }
      a { color: #0f766e; }
      svg {
        width: 100%;
        height: 78vh;
        background: #fff;
        border: 1px solid #d1d5db;
        border-radius: 14px;
        box-shadow: 0 10px 24px rgba(15, 23, 42, .08);
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>Graph View</h1>
      <p><a href="/index.html">노트 화면으로 돌아가기</a></p>
      <svg id="graph" viewBox="0 0 1000 700"></svg>
    </div>

    <script>
      async function loadGraph() {
        const res = await fetch('/api/graph');
        const data = await res.json();
        const svg = document.getElementById('graph');

        const nodes = data.nodes.map((n, i) => ({
          ...n,
          x: 500 + 280 * Math.cos((Math.PI * 2 * i) / Math.max(1, data.nodes.length)),
          y: 350 + 220 * Math.sin((Math.PI * 2 * i) / Math.max(1, data.nodes.length))
        }));
        const byId = Object.fromEntries(nodes.map(n => [n.id, n]));
        svg.innerHTML = '';

        for (const edge of data.edges) {
          if (!byId[edge.source] || !byId[edge.target]) continue;
          const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
          line.setAttribute('x1', byId[edge.source].x);
          line.setAttribute('y1', byId[edge.source].y);
          line.setAttribute('x2', byId[edge.target].x);
          line.setAttribute('y2', byId[edge.target].y);
          line.setAttribute('stroke', '#9ca3af');
          line.setAttribute('stroke-width', '1.4');
          svg.appendChild(line);
        }

        for (const node of nodes) {
          const group = document.createElementNS('http://www.w3.org/2000/svg', 'g');
          const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
          circle.setAttribute('cx', node.x);
          circle.setAttribute('cy', node.y);
          circle.setAttribute('r', 16);
          circle.setAttribute('fill', '#0f766e');
          circle.setAttribute('opacity', '0.85');

          const label = document.createElementNS('http://www.w3.org/2000/svg', 'text');
          label.setAttribute('x', node.x + 20);
          label.setAttribute('y', node.y + 4);
          label.setAttribute('font-size', '12');
          label.textContent = node.title || node.id;

          group.appendChild(circle);
          group.appendChild(label);
          svg.appendChild(group);
        }
      }

      loadGraph();
    </script>
  </body>
</html>
